<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GovPilot SOW Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Figtree', sans-serif; background: #f8fafc; padding: 24px; }
  @media print {
    .no-print { display: none !important; }
    body { background: white; padding: 0; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const RATE = 150;
const INCLUDED_HRS = 12;

const Logo = () => (
  <img src="https://i.postimg.cc/MKSh7kn4/Gov-Pilot-mark.png" alt="GovPilot" style={{height:52}}
    onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='inline'; }} />
);

function SOWGenerator() {
  const [step, setStep] = useState("form");
  const [docType, setDocType] = useState("sow");
  const [municipality, setMunicipality] = useState("");
  const [module, setModule] = useState("");
  const [baName, setBaName] = useState("");
  const [transcript, setTranscript] = useState("");
  const [originalHours, setOriginalHours] = useState("");
  const [sowData, setSowData] = useState(null);
  const [error, setError] = useState("");
  const [editMode, setEditMode] = useState(false);
  const [overridePrice, setOverridePrice] = useState(null);
  const [overrideNote, setOverrideNote] = useState("");
  const [showOverride, setShowOverride] = useState(false);

  const generate = async () => {
    if (!municipality || !module || !baName || !transcript) { setError("Please fill in all fields."); return; }
    setError(""); setStep("generating");
    const isChangeOrder = docType === "change_order";
    const prompt = `You are a GovPilot Professional Services BA creating a ${isChangeOrder ? "Change Order" : "Configuration Work Order"}.
Municipality: ${municipality}, Module: ${module}, Prepared By: ${baName}
Transcript: ${transcript}
Return ONLY valid JSON:
{"municipality":"${municipality}","module":"${module}","baName":"${baName}","docType":"${docType}","sections":[
{"name":"Database","details":["- item"],"hours":1.0},
{"name":"Fee Configuration","details":["- item"],"hours":0.5},
{"name":"Public Form Changes","details":["- Update form layout and design based on database field changes"],"hours":2.0},
{"name":"Admin Form Changes","details":["- Update form layout and design based on database field changes"],"hours":3.0},
{"name":"Mail Merges","details":["- template"],"hours":1.0},
{"name":"Reports","details":["- report"],"hours":2.0},
{"name":"Users and Workflows","details":["- Ensure workflows have correct triggers and emails"],"hours":0.5},
{"name":"Views, Titles, Tiles, Permissions","details":["- Configure default view","- Create views per status","- Assign permissions"],"hours":0.5},
{"name":"Other (QA)","details":["- Quality Assurance in Live"],"hours":1.0}
]}
Be specific with field names, report names, templates from transcript. Realistic hours: DB fields 1-3hrs, reports 0.5-1hr each, mail merges 0.25hr each, forms 1-3hrs, QA 1hr.`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:4000, messages:[{role:"user",content:prompt}] })
      });
      const data = await res.json();
      const text = data.content?.find(b => b.type==="text")?.text || "";
      const clean = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      parsed.originalHours = originalHours;
      setSowData(parsed); setOverridePrice(null); setOverrideNote(""); setShowOverride(false); setStep("result");
    } catch(e) { setError(`Error: ${e.message}`); setStep("form"); }
  };

  const totalHours = sowData?.sections?.reduce((s,r) => s+(parseFloat(r.hours)||0),0)||0;
  const isChangeOrder = sowData?.docType==="change_order";
  const origHrs = parseFloat(sowData?.originalHours)||0;
  const remainingIncluded = isChangeOrder ? Math.max(0,INCLUDED_HRS-origHrs) : 0;
  const billableChangeHrs = isChangeOrder ? Math.max(0,totalHours-remainingIncluded) : 0;
  const autoPrice = isChangeOrder ? billableChangeHrs*RATE : totalHours>INCLUDED_HRS ? (totalHours-INCLUDED_HRS)*RATE : 0;
  const finalPrice = overridePrice!==null ? parseFloat(overridePrice) : autoPrice;
  const isWaived = finalPrice===0 && autoPrice>0;
  const isOverage = !isChangeOrder && totalHours>INCLUDED_HRS;
  const overageHrs = isOverage ? (totalHours-INCLUDED_HRS).toFixed(2) : 0;
  const paymentTerms = finalPrice===0 ? "N/A" : "One Time — Due within 30 days of signature";

  const updateSection = (i,f,v) => setSowData(p => { const s=[...p.sections]; s[i]={...s[i],[f]:v}; return {...p,sections:s}; });
  const updateDetail = (si,di,v) => setSowData(p => { const s=[...p.sections]; const d=[...s[si].details]; d[di]=v; s[si]={...s[si],details:d}; return {...p,sections:s}; });
  const addDetail = si => setSowData(p => { const s=[...p.sections]; s[si]={...s[si],details:[...s[si].details,"- "]}; return {...p,sections:s}; });
  const removeDetail = (si,di) => setSowData(p => { const s=[...p.sections]; s[si]={...s[si],details:s[si].details.filter((_,i)=>i!==di)}; return {...p,sections:s}; });

  const ff = "'Figtree',sans-serif";
  const lbl = {display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:4};
  const inp = {width:"100%",border:"1px solid #cbd5e1",borderRadius:6,padding:"8px 10px",fontSize:14,boxSizing:"border-box",background:"#fff",fontFamily:ff};
  const btnP = {background:"#FF7143",color:"#fff",border:"none",borderRadius:6,padding:"10px 20px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:ff};
  const btnS = {background:"#fff",color:"#262F3D",border:"1px solid #cbd5e1",borderRadius:6,padding:"10px 20px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:ff};
  const btnA = {background:"#262F3D",color:"#fff",border:"none",borderRadius:6,padding:"10px 20px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:ff};
  const th = {padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,color:"#FF7143"};
  const td = {padding:"12px",borderBottom:"1px solid #e2e8f0",verticalAlign:"top",fontSize:13,lineHeight:1.6};

  if (step==="form") return (
    <div style={{fontFamily:ff,maxWidth:700,margin:"0 auto",padding:"24px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <Logo /><span style={{display:"none",fontSize:22,fontWeight:700,color:"#FF7143"}}>GovPilot</span>
        <div>
          <div style={{fontSize:20,fontWeight:700,color:"#262F3D"}}>GovPilot SOW Generator</div>
          <div style={{fontSize:13,color:"#666"}}>AI-assisted configuration work order drafting</div>
        </div>
      </div>
      <div style={{display:"flex",marginBottom:20,border:"1px solid #cbd5e1",borderRadius:8,overflow:"hidden",width:"fit-content"}}>
        {[["sow","📋 Configuration SOW"],["change_order","🔄 Change Order"]].map(([val,label]) => (
          <button key={val} onClick={()=>setDocType(val)} style={{padding:"10px 20px",fontSize:14,fontWeight:600,border:"none",cursor:"pointer",fontFamily:ff,background:docType===val?"#262F3D":"#fff",color:docType===val?"#fff":"#374151"}}>{label}</button>
        ))}
      </div>
      {docType==="change_order" && <div style={{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#92400e"}}><strong>Change Order mode:</strong> Hours billed at ${RATE}/hr after 12-hour included scope is used.</div>}
      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:24,display:"flex",flexDirection:"column",gap:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div><label style={lbl}>Municipality Name *</label><input style={inp} value={municipality} onChange={e=>setMunicipality(e.target.value)} placeholder="e.g. Borough of Avalon"/></div>
          <div><label style={lbl}>Module *</label><input style={inp} value={module} onChange={e=>setModule(e.target.value)} placeholder="e.g. Rental / Resale Inspections"/></div>
          <div style={{gridColumn:docType==="change_order"?"1/2":"1/-1"}}>
            <label style={lbl}>Prepared By *</label>
            <input style={inp} value={baName} onChange={e=>setBaName(e.target.value)} placeholder="e.g. Reham Hafez"/>
          </div>
          {docType==="change_order" && <div>
            <label style={lbl}>Original SOW Hours *</label>
            <input type="number" min="0" step="0.25" style={inp} value={originalHours} onChange={e=>setOriginalHours(e.target.value)} placeholder="e.g. 10"/>
            <div style={{fontSize:11,color:"#6b7280",marginTop:3}}>Hours used on original SOW</div>
          </div>}
        </div>
        <div>
          <label style={lbl}>Discovery Call Transcript / Notes *</label>
          <textarea style={{...inp,height:200,resize:"vertical"}} value={transcript} onChange={e=>setTranscript(e.target.value)} placeholder="Paste transcript or notes here..."/>
        </div>
        {error && <div style={{color:"#dc2626",fontSize:13}}>{error}</div>}
        <button onClick={generate} style={btnP}>Generate {docType==="change_order"?"Change Order":"SOW"} Draft →</button>
      </div>
    </div>
  );

  if (step==="generating") return (
    <div style={{fontFamily:ff,maxWidth:700,margin:"0 auto",padding:"80px 16px",textAlign:"center"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <Logo /><span style={{display:"none",fontSize:22,fontWeight:700,color:"#FF7143"}}>GovPilot</span>
      <div style={{marginTop:20,fontSize:18,fontWeight:600,color:"#262F3D"}}>Drafting your {docType==="change_order"?"Change Order":"SOW"}...</div>
      <div style={{marginTop:8,color:"#666",fontSize:14}}>Analyzing transcript and generating configuration work order</div>
      <div style={{width:40,height:40,border:"4px solid #e2e8f0",borderTop:"4px solid #FF7143",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"24px auto 0"}}/>
    </div>
  );

  return (
    <div style={{fontFamily:ff,maxWidth:800,margin:"0 auto",padding:"24px 16px"}}>
      <div className="no-print" style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={()=>{setStep("form");setSowData(null);}} style={btnS}>← New SOW</button>
        <button onClick={()=>setEditMode(e=>!e)} style={editMode?btnA:btnS}>{editMode?"✓ Done Editing":"✏ Edit"}</button>
        <button onClick={()=>window.print()} style={btnP}>🖨 Print / Save as PDF</button>
      </div>

      {(isOverage||isChangeOrder) && <div className="no-print" style={{marginBottom:16,borderRadius:8,padding:"12px 16px",fontSize:13,background:isWaived?"#f0fdf4":"#fef3c7",border:`1px solid ${isWaived?"#86efac":"#fde68a"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div>{isChangeOrder
            ? <span><strong>Change Order:</strong> {totalHours.toFixed(2)} hrs — {remainingIncluded.toFixed(2)} remaining = <strong>{billableChangeHrs.toFixed(2)} billable hrs × ${RATE}/hr = ${autoPrice.toFixed(2)}</strong>{isWaived&&<span style={{marginLeft:8,color:"#16a34a",fontWeight:600}}>— Waived</span>}</span>
            : <span><strong>Overage:</strong> {totalHours.toFixed(2)} hrs — {INCLUDED_HRS} included = <strong>{overageHrs} hrs × ${RATE}/hr = ${autoPrice.toFixed(2)}</strong>{isWaived&&<span style={{marginLeft:8,color:"#16a34a",fontWeight:600}}>— Waived</span>}</span>
          }</div>
          <button onClick={()=>setShowOverride(o=>!o)} style={{...btnS,padding:"4px 12px",fontSize:12}}>{showOverride?"Hide":"Adjust / Waive"}</button>
        </div>
        {showOverride && <div style={{marginTop:12,display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div><label style={{...lbl,fontSize:12}}>Override Price ($)</label><input type="number" min="0" step="0.01" style={{...inp,width:120}} placeholder={autoPrice.toFixed(2)} value={overridePrice??""} onChange={e=>setOverridePrice(e.target.value===""?null:e.target.value)}/></div>
          <div style={{flex:1,minWidth:180}}><label style={{...lbl,fontSize:12}}>Note (internal)</label><input style={inp} placeholder="e.g. Waived per manager approval" value={overrideNote} onChange={e=>setOverrideNote(e.target.value)}/></div>
          <button onClick={()=>setOverridePrice(0)} style={{...btnS,padding:"8px 12px",fontSize:12}}>Waive entirely</button>
          <button onClick={()=>{setOverridePrice(null);setOverrideNote("");}} style={{...btnS,padding:"8px 12px",fontSize:12}}>Reset</button>
        </div>}
      </div>}

      {!isOverage&&!isChangeOrder && <div className="no-print" style={{marginBottom:16,borderRadius:8,padding:"12px 16px",fontSize:13,background:"#f0fdf4",border:"1px solid #86efac",color:"#16a34a"}}><strong>✓ Within 12-hour included scope</strong> — No charge</div>}
      {editMode && <div className="no-print" style={{background:"#fef9c3",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#92400e"}}>Edit mode active — click any field to update.</div>}

      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:32}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:32}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <Logo /><span style={{display:"none",fontSize:22,fontWeight:700,color:"#FF7143"}}>GovPilot</span>
            <span style={{fontSize:28,fontWeight:700,color:"#FF7143"}}>{isChangeOrder?"Change Order":"Configuration"}</span>
          </div>
          <div style={{textAlign:"right",fontSize:13,color:"#444",lineHeight:1.8}}>
            <div><strong>Municipality:</strong> {sowData.municipality}</div>
            <div><strong>Module:</strong> {sowData.module}</div>
            <div><strong>Payment Terms:</strong> {paymentTerms}</div>
          </div>
        </div>
        <div style={{color:"#FF7143",fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:1,textAlign:"right",marginBottom:24}}>
          {isChangeOrder?"Change Order Approval:":"Configuration Approval:"}
        </div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{borderBottom:"2px solid #e2e8f0"}}>
              <th style={{...th,width:"15%"}}>Name</th>
              <th style={{...th,width:"62%"}}>Details</th>
              <th style={{...th,width:"12%",textAlign:"right"}}>Price</th>
              <th style={{...th,width:"11%",textAlign:"right"}}>Hours</th>
            </tr>
          </thead>
          <tbody>
            {sowData.sections.map((sec,si) => (
              <tr key={si} style={{background:si%2===0?"#FFF4F1":"#fff",verticalAlign:"top"}}>
                <td style={{...td,fontWeight:600,color:"#333"}}>{sec.name}</td>
                <td style={td}>
                  {sec.details.map((d,di) => (
                    <div key={di} style={{display:"flex",alignItems:"flex-start",gap:4}}>
                      {editMode
                        ? <><input value={d} onChange={e=>updateDetail(si,di,e.target.value)} style={{width:"100%",border:"1px solid #cbd5e1",borderRadius:4,padding:"2px 6px",fontSize:13,marginBottom:2,fontFamily:ff}}/><button onClick={()=>removeDetail(si,di)} style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontSize:16}}>×</button></>
                        : <span>{d}</span>
                      }
                    </div>
                  ))}
                  {editMode && <button onClick={()=>addDetail(si)} style={{marginTop:4,fontSize:12,color:"#FF7143",background:"none",border:"1px dashed #FF7143",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontFamily:ff}}>+ Add line</button>}
                </td>
                <td style={{...td,textAlign:"right",color:"#555"}}>{isChangeOrder?`$${((parseFloat(sec.hours)||0)*RATE).toFixed(2)}`:"$0.00"}</td>
                <td style={{...td,textAlign:"right"}}>
                  {editMode
                    ? <input type="number" step="0.25" value={sec.hours} onChange={e=>updateSection(si,"hours",parseFloat(e.target.value)||0)} style={{width:60,border:"1px solid #cbd5e1",borderRadius:4,padding:"2px 4px",fontSize:13,textAlign:"right",fontFamily:ff}}/>
                    : (parseFloat(sec.hours)||0).toFixed(2)
                  }
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{textAlign:"right",marginTop:20,fontSize:14,lineHeight:2}}>
          <div><strong>Total Hours:</strong> {totalHours.toFixed(2)}</div>
          {isOverage&&!isWaived&&<div style={{fontSize:13,color:"#92400e"}}>Overage: {overageHrs} hrs × ${RATE}/hr</div>}
          <div><strong>Total Price:</strong> ${finalPrice.toFixed(2)}{isWaived?" (Waived)":""}</div>
        </div>
        <div style={{marginTop:32,fontSize:13,color:"#444",borderTop:"1px solid #e2e8f0",paddingTop:20}}>
          <div><strong>Prepared By:</strong> {sowData.baName}</div>
          <div style={{marginTop:32}}>
            <div style={{fontWeight:600}}>Signed by:</div>
            <div style={{marginTop:40,borderBottom:"1px solid #333",width:240}}/>
            <div style={{marginTop:4,fontSize:12,color:"#666"}}>Authorized Signature / Date</div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SOWGenerator/>);
</script>
</body>
</html>
